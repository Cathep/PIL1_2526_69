{% extends 'base.html' %}
{% block titre %}Connexion - MentorLink{% endblock %}

{% block contenu %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                <h3>MentorLink IFRI</h3>
                <p class="text-muted">Connectez-vous à votre compte</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Email ou téléphone</label>
                    <input type="text" name="identifiant" class="form-control" placeholder="Email ou téléphone" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="mot_de_passe" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                </button>
            </form>
            <div class="text-end mt-2">
                <a href="{% url 'demander_reinitialisation' %}">Mot de passe oublié ?</a>
            </div>
            <hr>
            <p class="text-center mb-0">
                Pas encore de compte ?
                <a href="{% url 'inscription' %}">S'inscrire</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
