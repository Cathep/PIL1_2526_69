{% extends 'base.html' %}
{% block titre %}Inscription - MentorLink{% endblock %}

{% block contenu %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                <h3>Créer un compte</h3>
                <p class="text-muted">Rejoignez la communauté MentorLink IFRI</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" name="nom" class="form-control" placeholder="Votre nom" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" name="prenom" class="form-control" placeholder="Votre prénom" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Adresse email</label>
                    <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Numéro de téléphone</label>
                    <input type="text" name="telephone" class="form-control" placeholder="+229 00 00 00 00" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="mot_de_passe" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" name="confirmer_mot_de_passe" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-user-plus me-2"></i>Créer mon compte
                </button>
            </form>
            <hr>
            <p class="text-center mb-0">
                Déjà un compte ?
                <a href="{% url 'connexion' %}">Se connecter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
