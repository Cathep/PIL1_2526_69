{% extends 'base.html' %}
{% block titre %}Nouveau mot de passe - MentorLink{% endblock %}

{% block contenu %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="mb-3">Nouveau mot de passe</h4>
            <p class="text-muted mb-4">Choisissez un nouveau mot de passe pour votre compte MentorLink.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="mot_de_passe" class="form-control" placeholder="Nouveau mot de passe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" name="confirmer_mot_de_passe" class="form-control" placeholder="Confirmer le mot de passe" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Réinitialiser</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
